name: Deploy Site

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Generate artefacts
        run: |
          uv run --script scripts/generate_catalog.py
          uv run --script scripts/generate_marketplace.py
          uv run --script scripts/generate_zips.py
          uv run --script scripts/generate_site.py
      - name: Upload generated docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-site
          path: |
            catalog.json
            .github/plugin/marketplace.json
            docs/
