name: Deploy Marketplace to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate catalog.json
        run: |
          chmod +x scripts/generate-catalog.sh
          ./scripts/generate-catalog.sh

      - name: Generate docs/index.html
        run: |
          chmod +x scripts/generate-site.sh
          ./scripts/generate-site.sh

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate docs [skip ci]"
          git push
