name: Validate Catalog

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Run validator
        run: uv run --script system/scripts/validate_catalog.py

      - name: Run tests
        run: uv run --with pytest --with pyyaml --with jsonschema --with jinja2 -- pytest -q

      - name: Check catalog.json is up-to-date
        run: |
          cp system/artifacts/catalog.json /tmp/catalog.json.committed
          uv run --script system/scripts/generate_catalog.py
          python - <<'PY'
          import json
          import sys
          
          def normalize_catalog(path):
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
              if isinstance(data, dict):
                  data.pop("generated_at", None)
              return data
          
          committed = normalize_catalog("/tmp/catalog.json.committed")
          generated = normalize_catalog("system/artifacts/catalog.json")
          
          if committed != generated:
              print("")
              print("ERROR: catalog.json is stale. Run 'uv run --script system/scripts/generate_catalog.py' locally and commit the result.")
              sys.exit(1)
          PY

      - name: Check marketplace.json is up-to-date
        run: |
          uv run --script system/scripts/generate_marketplace.py
          if ! git diff --exit-code .github/plugin/marketplace.json; then
            echo ""
            echo "ERROR: .github/plugin/marketplace.json is stale. Run 'uv run --script system/scripts/generate_marketplace.py' locally and commit the result."
            exit 1
          fi
