name: Validate Catalog

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run validator
        run: uv run --script scripts/validate_catalog.py
      - name: Run tests
        run: uv run --with pytest --with pyyaml --with jsonschema --with jinja2 -- pytest -q
