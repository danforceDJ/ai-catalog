stages:
  - validate
  - pages

validate:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache bash jq
  script:
    - chmod +x scripts/generate-catalog.sh scripts/validate-catalog.sh
    - ./scripts/generate-catalog.sh
    - ./scripts/validate-catalog.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: pages
  image: alpine:latest
  before_script:
    - apk add --no-cache bash jq
  script:
    - chmod +x scripts/generate-catalog.sh scripts/generate-site.sh
    - ./scripts/generate-catalog.sh
    - ./scripts/generate-site.sh
    - mv docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
