repos:
  - repo: local
    hooks:
      - id: regenerate-catalog
        name: Regenerate catalog + marketplace manifest
        entry: system/scripts/hooks/regenerate-catalog.sh
        language: script
        pass_filenames: false
        files: ^(catalog/plugins/.*|catalog/templates/.*|catalog/skills/.*|catalog/agents/.*|catalog/prompts/.*|catalog/mcp/.*|system/config/marketplace\.config\.json$)

      - id: validate-catalog
        name: Validate catalog
        entry: system/scripts/hooks/validate-catalog.sh
        language: script
        pass_filenames: false
        files: ^(catalog/plugins/.*|catalog/templates/.*|catalog/skills/.*|catalog/agents/.*|catalog/prompts/.*|catalog/mcp/.*|system/config/marketplace\.config\.json|system/artifacts/catalog\.json|\.github/plugin/marketplace\.json)$
